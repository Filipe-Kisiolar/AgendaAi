<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalhe do Compromisso Recorrente</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Detalhe do Compromisso Recorrente</h1>

<div class="card-compromisso" th:if="${compromisso != null}">
    <div><strong th:text="${compromisso.nome}">Nome</strong></div>
    <div th:text="'Descrição: ' + ${compromisso.descricao}">Descrição</div>
    <div th:text="'Local: ' + ${compromisso.local}">Local</div>
    <div th:text="'Horário: ' + ${compromisso.horaInicial} + ' - ' + ${compromisso.horaFinal}">Horário</div>
    <div th:text="'Dias da Semana: ' + ${#strings.listJoin(compromisso.diasDaSemana, ', ')}">Dias</div>
    <div th:text="'Início da Recorrência: ' + ${#temporals.format(compromisso.dataInicioRecorrencia, 'dd/MM/yyyy')}">Início</div>
    <div th:text="'Fim da Recorrência: ' + ${#temporals.format(compromisso.dataFimRecorrencia, 'dd/MM/yyyy')}">Fim</div>

    <div class="botoes-acoes">
        <a th:href="@{'/ui/recorrentes/alterarcompromisso/' + ${compromisso.id}}">
            <button type="button" class="botao-azul">Alterar</button>
        </a>
        <a th:href="@{'/ui/recorrentes/deletarcompromisso/' + ${compromisso.id}}"
           onclick="return confirm('Deseja realmente excluir este compromisso recorrente?');">
            <button type="button" class="botao-vermelho">Deletar</button>
        </a>
    </div>
</div>

<div th:if="${compromisso == null}">
    <p>Compromisso não encontrado.</p>
</div>

<a href="/ui/recorrentes">Voltar</a>

</body>
</html>
