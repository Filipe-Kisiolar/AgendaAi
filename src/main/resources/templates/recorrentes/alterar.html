<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alterar Compromisso Recorrente</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Alterar Compromisso Recorrente</h1>

<form method="post" th:action="@{'/ui/recorrentes/alterarcompromisso/' + ${compromisso.id}}">
    <div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" th:value="${compromisso.nome}" required/>
    </div>

    <div>
        <label for="descricao">Descrição:</label>
        <input type="text" id="descricao" name="descricao" th:value="${compromisso.descricao}" required/>
    </div>

    <div>
        <label for="local">Local:</label>
        <input type="text" id="local" name="local" th:value="${compromisso.local}" required/>
    </div>

    <div>
        <label for="horaInicial">Hora Inicial:</label>
        <input type="time" id="horaInicial" name="horaInicial" th:value="${compromisso.horaInicial}" required/>
    </div>

    <div>
        <label for="horaFinal">Hora Final:</label>
        <input type="time" id="horaFinal" name="horaFinal" th:value="${compromisso.horaFinal}" required/>
    </div>

    <div>
        <label for="diasDaSemana">Dias da Semana:</label>
        <input type="text" id="diasDaSemana" name="diasDaSemana"
               th:value="${#strings.listJoin(compromisso.diasDaSemana, ', ')}" placeholder="Ex: MONDAY, WEDNESDAY"/>
    </div>

    <div>
        <label for="dataInicioRecorrencia">Data Início:</label>
        <input type="date" id="dataInicioRecorrencia" name="dataInicioRecorrencia"
               th:value="${compromisso.dataInicioRecorrencia}" required/>
    </div>

    <div>
        <label for="dataFimRecorrencia">Data Fim:</label>
        <input type="date" id="dataFimRecorrencia" name="dataFimRecorrencia"
               th:value="${compromisso.dataFimRecorrencia}" required/>
    </div>

    <button type="submit" class="botao-azul">Salvar</button>
</form>

<a href="/ui/recorrentes">Voltar</a>

</body>
</html>
