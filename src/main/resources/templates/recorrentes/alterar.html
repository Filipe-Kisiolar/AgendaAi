<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alterar Compromisso Recorrente</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Alterar Compromisso Recorrente</h1>

<form method="post" th:action="@{'/ui/recorrentes/alterarcompromisso/' + ${compromisso.id}}">
    <div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" th:value="${compromisso.nome}" required/>
    </div>

    <div>
        <label for="descricao">Descrição:</label>
        <input type="text" id="descricao" name="descricao" th:value="${compromisso.descricao}" required/>
    </div>

    <div>
        <label for="local">Local:</label>
        <input type="text" id="local" name="local" th:value="${compromisso.local}" />
    </div>

    <div>
        <label for="horaInicial">Hora Inicial:</label>
        <input type="time" id="horaInicial" name="horaInicial" th:value="${compromisso.horaInicial}" required/>
    </div>

    <div>
        <label for="horaFinal">Hora Final:</label>
        <input type="time" id="horaFinal" name="horaFinal" th:value="${compromisso.horaFinal}" required/>
    </div>

    <div>
        <label>Dias da Semana:</label>
        <div class="checkbox-group">
            <label><input type="checkbox" name="diasDaSemana" value="MONDAY"
                          th:checked="${#lists.contains(compromisso.diasDaSemana, T(java.time.DayOfWeek).MONDAY)}" /> Segunda</label>
            <label><input type="checkbox" name="diasDaSemana" value="TUESDAY"
                          th:checked="${#lists.contains(compromisso.diasDaSemana, T(java.time.DayOfWeek).TUESDAY)}" /> Terça</label>
            <label><input type="checkbox" name="diasDaSemana" value="WEDNESDAY"
                          th:checked="${#lists.contains(compromisso.diasDaSemana, T(java.time.DayOfWeek).WEDNESDAY)}" /> Quarta</label>
            <label><input type="checkbox" name="diasDaSemana" value="THURSDAY"
                          th:checked="${#lists.contains(compromisso.diasDaSemana, T(java.time.DayOfWeek).THURSDAY)}" /> Quinta</label>
            <label><input type="checkbox" name="diasDaSemana" value="FRIDAY"
                          th:checked="${#lists.contains(compromisso.diasDaSemana, T(java.time.DayOfWeek).FRIDAY)}" /> Sexta</label>
            <label><input type="checkbox" name="diasDaSemana" value="SATURDAY"
                          th:checked="${#lists.contains(compromisso.diasDaSemana, T(java.time.DayOfWeek).SATURDAY)}" /> Sábado</label>
            <label><input type="checkbox" name="diasDaSemana" value="SUNDAY"
                          th:checked="${#lists.contains(compromisso.diasDaSemana, T(java.time.DayOfWeek).SUNDAY)}" /> Domingo</label>
        </div>
    </div>

    <div>
        <label for="dataInicioRecorrencia">Data Início:</label>
        <input type="date" id="dataInicioRecorrencia" name="dataInicioRecorrencia"
               th:value="${compromisso.dataInicioRecorrencia}" required/>
    </div>

    <div>
        <label for="dataFimRecorrencia">Data Fim:</label>
        <input type="date" id="dataFimRecorrencia" name="dataFimRecorrencia"
               th:value="${compromisso.dataFimRecorrencia}" required/>
    </div>

    <button type="submit" class="botao-azul">Salvar</button>
</form>

<a href="/ui/recorrentes">Voltar</a>

<script>
    document.querySelector("form").addEventListener("submit", function(event) {
        const checkboxes = document.querySelectorAll('input[name="diasDaSemana"]:checked');
        if (checkboxes.length === 0) {
            alert("Selecione pelo menos um dia da semana.");
            event.preventDefault();
        }
    });
</script>

</body>
</html>
