<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Compromissos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Lista de Compromissos</h1>

<div th:if="${#lists.isEmpty(compromissos)}">
    <p>Não há compromissos cadastrados.</p>
</div>

<div th:if="${!#lists.isEmpty(compromissos)}">
    <div th:each="c : ${compromissos}" class="card-compromisso">
        <div>
            <strong th:text="${c.nome}">Nome</strong>
        </div>
        <div th:text="'Descrição: ' + ${c.descricao}">Descrição</div>
        <div th:text="'Local: ' + ${c.local}">Local</div>
        <div th:text="'Data: ' + ${#temporals.format(c.dia, 'dd/MM/yyyy')}">Data</div>
        <div th:text="'Horário: ' + ${c.horaInicial} + ' - ' + ${c.horaFinal}">Horário</div>

        <div class="botoes-acoes">
            <a th:href="@{'/ui/compromissos/alterarcompromisso/' + ${c.id}}">
                <button type="button" class="botao-azul">Alterar</button>
            </a>
            <a th:href="@{'/ui/compromissos/deletarcompromisso/' + ${c.id}}"
               onclick="return confirm('Deseja realmente excluir este compromisso?');">
                <button type="button" class="botao-vermelho">Deletar</button>
            </a>
        </div>

        <hr/>
    </div>
</div>

<a href="/ui/compromissos">Voltar</a>

</body>
</html>
