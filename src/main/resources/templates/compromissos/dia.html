<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Compromissos do Dia</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Compromissos do Dia</h1>

<form action="#" onsubmit="event.preventDefault(); redirecionarParaDia();">
    <label for="data">Escolha o dia:</label>
    <input type="date" id="data" name="data" required>
    <button type="submit">Ver Compromissos</button>
</form>

<script>
    function redirecionarParaDia() {
        const data = document.getElementById('data').value;
        if (data) {
            window.location.href = `/ui/compromissos/listarcompromissosdodia/${data}`;
        }
    }
</script>

<div th:if="${compromissos}">
    <h2 th:text="'Compromissos para o dia: ' + ${dia}"></h2>

    <table class="tabela-dia" th:if="${!#lists.isEmpty(compromissos)}">
        <thead>
        <tr>
            <th>Horário</th>
            <th>Nome</th>
            <th>Local</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comp : ${compromissos}">
            <td th:text="${comp.horaInicial} + ' - ' + ${comp.horaFinal}">08:00 - 09:00</td>
            <td th:text="${comp.nome}">Compromisso</td>
            <td th:text="${comp.local}">Local</td>
            <td>
                <div class="botoes-acoes">
                    <a th:href="@{'/ui/compromissos/alterarcompromisso/' + ${comp.id}}">
                        <button type="button" class="botao-azul">Alterar</button>
                    </a>
                    <a th:href="@{'/ui/compromissos/deletarcompromisso/' + ${comp.id}}"
                       onclick="return confirm('Deseja realmente excluir este compromisso?');">
                        <button type="button" class="botao-vermelho">Deletar</button>
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(compromissos)}" class="sem-compromissos">
        Nenhum compromisso neste dia.
    </div>
</div>

<a href="/ui/menu">Voltar ao Menu</a>

</body>
</html>
