<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Compromisso</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>Cadastrar Compromisso</h1>

<form method="post" action="/ui/compromissos/criarcompromisso">
    <div>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Nome do compromisso" required />
    </div>

    <div>
        <label for="descricao">Descrição:</label>
        <input type="text" id="descricao" name="descricao" placeholder="Descrição do compromisso" required />
    </div>

    <div>
        <label for="local">Local:</label>
        <input type="text" id="local" name="local" placeholder="Local do compromisso"  />
    </div>

    <div>
        <label for="dia">Data:</label>
        <input type="date" id="dia" name="dia" required />
    </div>

    <div>
        <label for="horaInicial">Hora Inicial:</label>
        <input type="time" id="horaInicial" name="horaInicial" required />
    </div>

    <div>
        <label for="horaFinal">Hora Final:</label>
        <input type="time" id="horaFinal" name="horaFinal" required />
    </div>

    <div>
        <label for="compromissoRecorrenteId">ID do Recorrente (opcional):</label>
        <input type="number" id="compromissoRecorrenteId" name="compromissoRecorrenteId"
               placeholder="Deixe em branco se não for recorrente" min="0" />
        <small style="color: #555;">Deixe em branco se não estiver vinculado a um compromisso recorrente.</small>
    </div>

    <button type="submit" class="botao-azul">Salvar</button>
</form>

<a href="/ui/compromissos">Voltar</a>

<script>
    document.querySelector("form").addEventListener("submit", function() {
        const idInput = document.getElementById("compromissoRecorrenteId");
        if (!idInput.value) {
            idInput.value = 0;
        }
    });
</script>

</body>
</html>
