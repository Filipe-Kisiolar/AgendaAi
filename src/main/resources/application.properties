spring.application.name=Viviane.Ai

# Dialeto específico do PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#CREDENCIAIS DO BANCO DE DADOS
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#VARIAVEL GERACAO DE TOKEN
jwt.segredo=${VARIAVELSECRETA}

#JPA E HIBERNATE
# Valida o schema com base nas entidades. Usa Flyway para gerenciar o schema.
spring.jpa.hibernate.ddl-auto=validate

# Log de SQL no console (útil em dev)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

#SPRING AI CONFIG
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o

#FRONTEND REACTJS
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

#CLOUD CONFIGURATIONS
aws.region=us-east-1
storage.bucket=vivianeai-bucket
storage.accessKey=minio
storage.secretKey=minio123
storage.endpoint=http://localhost:9000
storage.pathStyle=true

#LIMIT THE IMAGE RANGE
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB