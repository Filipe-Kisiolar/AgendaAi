spring:
  application:
    name: Viviane.Ai

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  rabbitmq:
    addresses: amqps://jackal.rmq.cloudamqp.com:5671
    username: hswpxmta
    password: ${RABBITMQ_PASSWORD}
    virtual-host: hswpxmta

app:
  rabbit:
    exchange:
      events: viviane.events
    routing:
      emailAccountCreated: email.account.created
      emailPasswordReset: email.password.reset

server:
  address: 0.0.0.0

jwt:
  segredo: ${VARIAVELSECRETA}

aws:
  region: us-east-1

storage:
  bucket: vivianeai-bucket
  accessKey: minio
  secretKey: minio123
  endpoint: http://localhost:9000
  pathStyle: true